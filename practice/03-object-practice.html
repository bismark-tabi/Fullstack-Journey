<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objects in JavaScript</title>
</head>
<body>
  <script>
    const person = {
      name: "Alice",
      age: 30,
      city: "New York",
      job: "Engineer"
    };

    //Dot Notation
    console.log(person.name);  // Alice
    console.log(person.age);   // 30

    //bracket Notation
    console.log(person["name"]); // Alice
    console.log(person["age"]); //  30

    const oddObject = {
      "1stProperty": "Hello",
      "property with spaces": "World"
    };

    console.log(oddObject["1stProperty"]);  // Hello
    console.log(oddObject["property with spaces"]);  // World

    let propertyName = "city";
    console.log(person[propertyName]); // Wonderland





    //delete operator used to remove object properties
    delete person.job;
    console.log(person.job);

    //Destructuring method used to remove object properties
    const person1 = {
      name: "Bob",
      age: 25,
      job: "Designer",
      city: "New York"
    };

    const { job, city, ...remainingProperties } = person1;

    // { name: "Bob", age: 25 }
    console.log(remainingProperties);






    //Using hasOwnProperty() to check if the objects has certain properties
    console.log(person.hasOwnProperty("name")); // true
    console.log(person.hasOwnProperty("job")); // false

    //Using Object.hasOwn() to check if the objects has certain properties
    console.log(Object.hasOwn(person, "name")); // true
    console.log(Object.hasOwn(person, "job")); // false

    //Using in operator
    console.log("name" in person);  // true

    //By Checking if an object is undefined
    const car = {
      brand: "Toyota",
      model: "Corolla",
      year: 2020
    };

    console.log(car.brand !== undefined); // true
    console.log(car.color !== undefined); // false
  </script>
</body>
</html>
